<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <link rel="icon" href="./assets/logo.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap"
            rel="stylesheet"
        />
        <title>Twitch Multistream Viewer - streams.kyuu.gg</title>
    </head>
    <body>
        <div id="top-container">
            <div id="sidebar">
                <input
                    id="sidebar-input"
                    type="text"
                    placeholder="Streamer (e.g. ayukyuu)"
                    maxlength="25"
                />
                <nav id="buttons-nav">
                    <!-- <div class="sidebar-button-container"> 
                        <button class="sidebar-streamer-button">streamer</button>
                        <button class="sidebar-delete-button">🗑️</button>
                    </div> -->
                </nav>
            </div>
            <div id="stream">
                <div id="stream-header">
                    <h1 id="stream-name"></h1>
                </div>
                <div id="stream-frame-container">
                    <iframe src="" id="stream-frame" allowfullscreen></iframe>
                </div>
            </div>
        </div>
        <div id="footer">
            <a href="https://kyuu.gg">
                <img
                    id="footer-logo"
                    src="./assets/logo.png"
                    alt="The KyuuGG logo"
                />
            </a>
            <p id="footer-paragraph">
                &copy; KyuuGG, Licensed under the MIT license.
                <a href="https://www.github.com/kyuugg">GitHub</a>
            </p>
        </div>
        <script type="module" src="script.js"></script>
    </body>
</html>
