<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap"
            rel="stylesheet"
        />
        <title>Twitch Multistream Viewer - streams.kyuu.gg</title>
    </head>
    <body>
        <div id="top-container">
            <div id="sidebar">
                <input
                    id="sidebar-input"
                    type="text"
                    placeholder="Streamer (e.g. ayukyuu)"
                />
                <div class="sidebar-button-container">
                    <button class="sidebar-streamer-button">streamer</button>
                    <button class="sidebar-delete-button">🗑️</button>
                </div>
                <div class="sidebar-button-container">
                    <button class="sidebar-streamer-button">streamer</button>
                    <button class="sidebar-delete-button">🗑️</button>
                </div>
                <div class="sidebar-button-container">
                    <button class="sidebar-streamer-button">streamer</button>
                    <button class="sidebar-delete-button">🗑️</button>
                </div>
                <div class="sidebar-button-container">
                    <button class="sidebar-streamer-button">streamer</button>
                    <button class="sidebar-delete-button">🗑️</button>
                </div>
            </div>
            <div id="stream">
                <div id="stream-header">
                    <h1 id="stream-name">streamer name</h1>
                </div>
                <div id="stream-frame">
                    <iframe
                        src="https://player.twitch.tv/?channel=vadeal&parent=127.0.0.1"
                        frameborder="0"
                        id="stream-frame"
                    ></iframe>
                </div>
            </div>
        </div>
        <div id="footer">
            <img
                id="footer-logo"
                src="./assets/logo.png"
                alt="The KyuuGG logo"
            />
            <p id="footer-paragraph">
                &copy; KyuuGG, Licensed under the MIT license.
                <a href="https://www.github.com/kyuugg">GitHub</a>
            </p>
        </div>
    </body>
</html>
